[tox]
env_list =
    mypy
    py{39,310,311,312,313,314}
    py39-urllib3-1
    docs
isolated_build = True
minversion = 4.4.0

[testenv]
description = run the tests with pytest
package = wheel
wheel_build_env = .pkg
dependency_groups = tests
commands =
    pytest -s {tty:--color=yes} {posargs}

[testenv:py39-urllib3-1]
base_python = py39
deps =
    urllib3==1.26.0
    requests==2.25.0
constrain_package_deps = true

[testenv:mypy]
description = run mypy type checks
base_python = py314
dependency_groups = mypy
commands =
    mypy

[testenv:dev]
description = create a dev environment
base_python = py314
dependency_groups = mypy, tests, docs, deploy
commands =

[testenv:docs]
description = build documentation
base_python = py314
dependency_groups = docs
commands =
    sphinx-build -M html docs/source docs/build --fail-on-warning

[testenv:deploy]
description = deploy package
base_python = py314
dependency_groups = deploy
passenv =
    TWINE_REPOSITORY_URL
    TWINE_USERNAME
    TWINE_PASSWORD
commands =
    python3 -m twine upload .tox/.pkg/dist/*
